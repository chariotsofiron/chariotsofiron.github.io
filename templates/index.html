<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ get_url(path="main.css", trailing_slash=false) }}">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
</head>

<body>
    <div class="container">
        <header>
            <a href="{{ config.base_url }}">{{ config.title }}</a>
            <nav>
                {% block sidebar_nav %}
                <div>
                    {% for link in config.extra.menu %}
                    <a href="{{ link.url }}">{{ link.name }}</a>
                    {% endfor %}
                </div>
                {% endblock sidebar_nav %}
            </nav>
        </header>

        <main>
            {% block content %}
            <ul>
                {% for page in section.pages %}
                <li>
                    <p><a href="{{ page.permalink | safe }}">{{ page.title }}</a> - <time datetime="{{ page.date }}">{{
                            page.date | date(format="%F") }}</time></p>
                </li>
                {% endfor %}
            </ul>
            {% endblock content %}
        </main>
    </div>

</body>

</html>
