<!DOCTYPE html>
<html lang="en">

<script>
    MathJax = {
        tex: {
            displayMath: [['$$', '$$'], ["\\[", "\\]"]],
            inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
    };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
    <link rel="stylesheet" href="{{ get_url(path="main.css", trailing_slash=false) }}">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
</head>

<body>
    <header>
        <div class="header-content">
            <a class="header-content-title" href="{{ config.base_url }}">{{ config.title }}</a>
            <nav class="header-content-nav">
                <a href="#" class="header-content-nav-icon">
                    <svg viewBox="0 0 18 15" width="18">
                        <path fill="#5c5c5c"
                            d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.031C17.335,0,18,0.665,18,1.484L18,1.484z" />
                        <path fill="#5c5c5c"
                            d="M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484 h15.031C17.335,6.031,18,6.696,18,7.516L18,7.516z" />
                        <path fill="#5c5c5c"
                            d="M18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,12.031,18,12.696,18,13.516L18,13.516z" />
                    </svg>
                </a>
                {% block sidebar_nav %}
                <div class="header-content-nav-trigger">
                    {% for link in config.extra.menu %}
                    <a class="header-content-nav-trigger-link" href="{{ link.url }}">{{ link.name }}</a>
                    {% endfor %}
                </div>
                {% endblock sidebar_nav %}
            </nav>
        </div>
    </header>

    <main class="blog">
        {% block content %}
        <div class="blog-posts">
            <ul class="blog-posts-list">
                {% for page in section.pages %}
                <li>
                    <p><a href="{{ page.permalink | safe }}">{{ page.title }}</a> - <time datetime="{{ page.date }}">{{
                            page.date | date(format="%F") }}</time></p>
                </li>
                {% endfor %}
            </ul>
        </div>
        {% endblock content %}
    </main>

    <footer>

    </footer>

</body>

</html>
