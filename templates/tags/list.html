{% extends "index.html" %}

{% block content %}
<article class="page-content">
    {% for term in terms %}
    <h2 id="{{ term.name }}">#<a href="{{ term.permalink | safe }}">{{ term.name }}</a></h2>
    {% for page in term.pages %}
    <p><a href="{{ page.permalink | safe }}">{{ page.title }}</a> - <time datetime="{{ page.date }}">{{ page.date |
            date(format="%F") }}</time></p>
    {% endfor %}
    {% endfor %}
</article>
{% endblock content %}
