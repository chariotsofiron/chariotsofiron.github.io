{% extends "index.html" %}

{% block content %}
<article class="page-content">
    <h1 class="page-content-title">{{ page.title }}</h1>
    Published: <time datetime="{{ page.date }}">{{ page.date | date(format="%F") }}</time>
    <div class="content">
        {{ page.content | safe }}
    </div>
</article>
{% endblock content %}
